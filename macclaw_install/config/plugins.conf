#!/usr/bin/env zsh
# ==============================================================================
# MacClaw Install - 插件配置
# ==============================================================================
#
# 推荐插件列表
#
# ==============================================================================

# 推荐插件列表
declare -a RECOMMENDED_PLUGINS=(
    # 开发者工具
    "@iotchange/skill-developer"
    "@iotchange/skill-coder"

    # 实用工具
    "@openclaw/plugin-fs"
    "@openclaw/plugin-web"
)

# 插件描述
declare -A PLUGIN_DESCRIPTIONS=(
    "@iotchange/skill-developer"="开发者技能 - 提供代码开发、调试、测试等功能"
    "@iotchange/skill-coder"="编程助手 - 提供代码生成、优化、重构等功能"
    "@openclaw/plugin-fs"="文件系统插件 - 提供文件操作、目录管理等功能"
    "@openclaw/plugin-web"="网络插件 - 提供HTTP请求、API调用等功能"
)

# 插件类别
declare -A PLUGIN_CATEGORIES=(
    "@iotchange/skill-developer"="development"
    "@iotchange/skill-coder"="development"
    "@openclaw/plugin-fs"="utility"
    "@openclaw/plugin-web"="utility"
)
