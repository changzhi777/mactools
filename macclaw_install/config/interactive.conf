# ------------------------------------------------------------------------------
# 对话框配置
# ------------------------------------------------------------------------------

# 对话框标题
DIALOG_TITLE="MacClaw 交互式安装"

# 对话框图标类型（note, caution, stop）
DIALOG_ICON="note"

# 对话框按钮
DIALOG_BUTTON_OK="确定"
DIALOG_BUTTON_CANCEL="取消"
DIALOG_BUTTON_RETRY="重试"
DIALOG_BUTTON_LATER="稍后提醒"

# ------------------------------------------------------------------------------
# 浏览器配置
# ------------------------------------------------------------------------------

# 浏览器打开命令
BROWSER_OPEN_CMD="open"

# 是否后台打开（不切换焦点）
BROWSER_OPENInBackground=false

# ------------------------------------------------------------------------------
# URL 配置
# ------------------------------------------------------------------------------

# omlx 官网
OMLX_URL="https://omlx.ai/"

# OpenClaw 官网
OPENCLAW_URL="https://openclaw.ai/"

# 推荐的 AI 模型
MODEL_NAME="mlx-community/gemma-4-e4b-it-4bit"

# 模型下载页面
MODEL_DOWNLOAD_URL="https://omlx.ai/models"

# ------------------------------------------------------------------------------
# 工作流配置
# ------------------------------------------------------------------------------

# 步骤超时时间（秒）
STEP_TIMEOUT=3600

# 是否自动跳过已完成的步骤
AUTO_SKIP_COMPLETED=true

# 是否显示详细日志
VERBOSE_LOGGING=true

# ------------------------------------------------------------------------------
# 测试配置
# ------------------------------------------------------------------------------

# OpenClaw 测试提示词
OPENCLAW_TEST_PROMPT="你好，请做一个自我介绍。"

# 测试超时时间（秒）
OPENCLAW_TEST_TIMEOUT=30

# ------------------------------------------------------------------------------
# 技能菜单配置
# ------------------------------------------------------------------------------

# 技能安装菜单文件路径
SKILLS_MENU_SCRIPT="${SCRIPT_DIR}/install.zsh"

# 技能安装起始函数
SKILLS_MENU_FUNCTION="show_main_menu"
