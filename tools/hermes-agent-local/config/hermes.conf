# ============================================================================
# 安装配置
# ============================================================================

# 安装目录
HERMES_INSTALL_DIR="${HOME}/.hermes/hermes-agent"

# 符号链接目录
HERMES_BIN_DIR="${HOME}/.local/bin"

# 仓库 URL
HERMES_REPO_URL="https://github.com/NousResearch/hermes-agent.git"

# 分支
HERMES_REPO_BRANCH="main"

# ============================================================================
# Python 配置
# ============================================================================

# Python 版本要求
PYTHON_MIN_VERSION="3.11"

# 虚拟环境名称
VENV_NAME=".venv"

# ============================================================================
# uv 包管理器配置
# ============================================================================

# uv 安装 URL
UV_INSTALL_URL="https://astral.sh/uv/install.sh"

# uv 版本（留空使用最新版）
UV_VERSION=""

# ============================================================================
# 可选依赖
# ============================================================================

# 安装完整功能（包含所有可选依赖）
INSTALL_FULL_FEATURES=false

# 额外的 Python 包（空格分隔）
EXTRA_PYTHON_PACKAGES=""

# ============================================================================
# 网络配置
# ============================================================================

# Git 克隆超时（秒）
GIT_TIMEOUT=300

# 下载重试次数
DOWNLOAD_RETRY=3

# ============================================================================
# 日志配置
# ============================================================================

# 日志文件路径
LOG_FILE="${HOME}/.hermes/install.log"

# 日志级别（debug, info, warning, error）
LOG_LEVEL="info"

# ============================================================================
# 交互配置
# ============================================================================

# 自动确认所有提示（非交互模式）
AUTO_CONFIRM=false

# 显示详细输出
VERBOSE=false
