# ============================================================================
# 功能扩展包
# ============================================================================

# 消息功能扩展
# 包含: messaging 相关依赖
HERMES_EXTRAS_MESSAGING=false

# 语音功能扩展
# 包含: voice 相关依赖
HERMES_EXTRAS_VOICE=false

# 浏览器工具扩展
# 包含: browser use 相关依赖
# 需要: Node.js >= 22
HERMES_EXTRAS_BROWSER=false

# 所有扩展
# 等同于安装所有可选功能
HERMES_EXTRAS_ALL=false

# ============================================================================
# 开发工具
# ============================================================================

# 安装开发工具
# 包含: 测试工具、代码格式化工具等
INSTALL_DEV_TOOLS=false

# ============================================================================
# 数据存储
# ============================================================================

# 数据目录
HERMES_DATA_DIR="${HOME}/.hermes/data"

# 配置目录
HERMES_CONFIG_DIR="${HOME}/.hermes/config"

# 缓存目录
HERMES_CACHE_DIR="${HOME}/.hermes/cache"

# ============================================================================
# 高级选项
# ============================================================================

# 使用预编译二进制文件
USE_PREBUILT_BINARIES=true

# 启用实验性功能
ENABLE_EXPERIMENTAL=false

# 并发安装数
CONCURRENT_INSTALLS=4

# ============================================================================
# 集成配置
# ============================================================================

# 添加到 PATH
ADD_TO_PATH=true

# 创建桌面快捷方式（Linux）
CREATE_DESKTOP_SHORTCUT=false

# 创建启动器（macOS）
CREATE_LAUNCHER=false
