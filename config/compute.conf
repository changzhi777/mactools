CHIP_M2_MAX_CORES=12
CHIP_M2_MAX_MEMORY_BANDWIDTH=400  # GB/s
CHIP_M2_MAX_NEURAL_ENGINE=16
CHIP_M2_MAX_RELEASE_YEAR=2023

# M2 Ultra 芯片
CHIP_M2_ULTRA_NAME="Apple M2 Ultra"
CHIP_M2_ULTRA_CORES=24
CHIP_M2_ULTRA_MEMORY_BANDWIDTH=800  # GB/s
CHIP_M2_ULTRA_NEURAL_ENGINE=32
CHIP_M2_ULTRA_RELEASE_YEAR=2023

# M3 芯片 (2023年)
CHIP_M3_NAME="Apple M3"
CHIP_M3_CORES=8
CHIP_M3_MEMORY_BANDWIDTH=100  # GB/s
CHIP_M3_NEURAL_ENGINE=16
CHIP_M3_RELEASE_YEAR=2023

# M3 Pro 芯片
CHIP_M3_PRO_NAME="Apple M3 Pro"
CHIP_M3_PRO_CORES=12
CHIP_M3_PRO_MEMORY_BANDWIDTH=150  # GB/s
CHIP_M3_PRO_NEURAL_ENGINE=16
