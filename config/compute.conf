CHIP_M1_NEURAL_ENGINE=16
CHIP_M1_RELEASE_YEAR=2020

# M1 Pro 芯片
CHIP_M1_PRO_NAME="Apple M1 Pro"
CHIP_M1_PRO_CORES=10
CHIP_M1_PRO_MEMORY_BANDWIDTH=200  # GB/s
CHIP_M1_PRO_NEURAL_ENGINE=16
CHIP_M1_PRO_RELEASE_YEAR=2021

# M1 Max 芯片
