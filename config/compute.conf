# M3 Max 芯片
CHIP_M3_MAX_NAME="Apple M3 Max"
CHIP_M3_MAX_CORES=16
CHIP_M3_MAX_MEMORY_BANDWIDTH=300  # GB/s
CHIP_M3_MAX_NEURAL_ENGINE=16
CHIP_M3_MAX_RELEASE_YEAR=2023

# M4 芯片 (2024年，预测)
CHIP_M4_NAME="Apple M4"
CHIP_M4_CORES=10
CHIP_M4_MEMORY_BANDWIDTH=120  # GB/s
CHIP_M4_NEURAL_ENGINE=16
CHIP_M4_RELEASE_YEAR=2024

# M4 Pro 芯片 (预测)
CHIP_M4_PRO_NAME="Apple M4 Pro"
CHIP_M4_PRO_CORES=14
CHIP_M4_PRO_MEMORY_BANDWIDTH=200  # GB/s
CHIP_M4_PRO_NEURAL_ENGINE=16
CHIP_M4_PRO_RELEASE_YEAR=2024

# M5 芯片 (2025年，预测)
CHIP_M5_NAME="Apple M5"
CHIP_M5_CORES=12
CHIP_M5_MEMORY_BANDWIDTH=150  # GB/s
CHIP_M5_NEURAL_ENGINE=16
CHIP_M5_RELEASE_YEAR=2025

# ------------------------------------------------------------------------------
# oMLX 安装配置
# ------------------------------------------------------------------------------

COMPUTE_APPLE_SILICON_ENGINE="omlx"
COMPUTE_APPLE_SILICON_PACKAGE="omlx"
COMPUTE_APPLE_SILICON_INSTALL_METHOD="pip"
COMPUTE_APPLE_SILICON_PIP_PACKAGE="omlx"
COMPUTE_APPLE_SILICON_MIN_VERSION="0.5.0"

# ------------------------------------------------------------------------------
# Intel CPU 配置
# ------------------------------------------------------------------------------

# Intel CPU 不配置专用算力
COMPUTE_INTEL_CPU_ENGINE="cpu"
COMPUTE_INTEL_CPU_INSTALL="false"

# ------------------------------------------------------------------------------
# NVIDIA GPU 配置（暂不支持）
# ------------------------------------------------------------------------------

# NVIDIA GPU 配置
COMPUTE_NVIDIA_GPU_ENGINE="cuda"
COMPUTE_NVIDIA_GPU_INSTALL="false"
COMPUTE_NVIDIA_GPU_MIN_CUDA_VERSION="11.0"

# ------------------------------------------------------------------------------
# 推理引擎优先级
# ------------------------------------------------------------------------------

# Apple Silicon 优先级
COMPUTE_APPLE_SILICON_PRIORITY=(
    "omlx"      # 第一优先级：oMLX（最佳性能）
    "mps"       # 第二优先级：PyTorch MPS
    "cpu"       # 第三优先级：CPU
)

# Intel 优先级
COMPUTE_INTEL_PRIORITY=(
    "cpu"       # 唯一选项：CPU
)

# ------------------------------------------------------------------------------
# AI 模型配置
# ------------------------------------------------------------------------------

# 模型定义
# 格式：模型名称:大小(GB):最低内存(GB):推荐芯片
MODELS_AVAILABLE=(
    # 4-bit 模型（轻量级）
    "gemma-4-e4b-it-4bit:4:8:M1,M2,M3,M4,M5"
    "gemma-4-9b-it-4bit:5:12:M1_PRO,M2_PRO,M3_PRO,M4_PRO"
    "llama-3-8b-it-4bit:5:12:M1,M2,M3,M4,M5"

    # 8-bit 模型（平衡）
    "gemma-4-e4b-it-8bit:7:16:M1_PRO,M2_PRO,M3_PRO,M4_PRO,M5"
    "gemma-4-9b-it-8bit:9:24:M1_MAX,M2_MAX,M3_MAX,M4_PRO,M5"
    "llama-3-8b-it-8bit:8:20:M1_MAX,M2_MAX,M3_MAX"

    # 16-bit 模型（高质量）
    "gemma-4-e4b-it-16bit:14:32:M1_MAX,M2_ULTRA,M3_MAX,M4_PRO,M5"
    "gemma-4-9b-it-16bit:18:48:M2_ULTRA,M3_MAX,M5"
    "llama-3-8b-it-16bit:16:40:M1_MAX,M2_ULTRA,M3_MAX"

    # FP16 模型（完整精度）
    "gemma-4-e4b-it-fp16:28:64:M2_ULTRA,M3_MAX,M5"
    "llama-3-8b-it-fp16:32:64:M2_ULTRA,M3_MAX,M5"
)

# 智能模型推荐规则
# 格式：芯片:内存(GB):推荐模型
MODEL_RECOMMENDATION_RULES=(
    # M1 系列
    "M1:8:gemma-4-e4b-it-4bit"
    "M1:16:gemma-4-e4b-it-4bit"
    "M1:32:gemma-4-9b-it-8bit"
    "M1_PRO:16:gemma-4-e4b-it-4bit"
    "M1_PRO:32:gemma-4-9b-it-8bit"
    "M1_MAX:32:gemma-4-9b-it-8bit"
    "M1_MAX:64:gemma-4-9b-it-16bit"

    # M2 系列
    "M2:8:gemma-4-e4b-it-4bit"
    "M2:16:gemma-4-e4b-it-4bit"
    "M2:32:gemma-4-9b-it-8bit"
    "M2_PRO:16:gemma-4-e4b-it-4bit"
    "M2_PRO:32:gemma-4-9b-it-8bit"
    "M2_MAX:32:gemma-4-9b-it-8bit"
    "M2_MAX:64:gemma-4-9b-it-16bit"
    "M2_ULTRA:64:gemma-4-9b-it-16bit"
    "M2_ULTRA:128:gemma-4-e4b-it-fp16"

    # M3 系列
    "M3:8:gemma-4-e4b-it-4bit"
    "M3:16:gemma-4-e4b-it-4bit"
    "M3:32:gemma-4-9b-it-8bit"
    "M3_PRO:16:gemma-4-e4b-it-4bit"
    "M3_PRO:32:gemma-4-9b-it-8bit"
    "M3_MAX:32:gemma-4-9b-it-8bit"
    "M3_MAX:64:gemma-4-9b-it-16bit"
    "M3_MAX:128:gemma-4-e4b-it-fp16"

    # M4 系列（预测）
    "M4:8:gemma-4-e4b-it-4bit"
    "M4:16:gemma-4-e4b-it-4bit"
    "M4:32:gemma-4-9b-it-8bit"
    "M4_PRO:16:gemma-4-e4b-it-4bit"
    "M4_PRO:32:gemma-4-9b-it-8bit"
    "M4_PRO:64:gemma-4-9b-it-16bit"

    # M5 系列（预测）
    "M5:8:gemma-4-e4b-it-4bit"
    "M5:16:gemma-4-e4b-it-4bit"
    "M5:32:gemma-4-9b-it-8bit"
    "M5:64:gemma-4-9b-it-16bit"
    "M5:128:gemma-4-e4b-it-fp16"
)

# 默认模型（如果无法检测芯片）
MODEL_DEFAULT="gemma-4-e4b-it-4bit"

# 模型下载源
MODEL_DOWNLOAD_SOURCE="modelscope"
MODEL_DOWNLOAD_MIRROR="https://modelscope.cn"
MODEL_DOWNLOAD_BACKUP_MIRROR="https://hf-mirror.com"

# 模型缓存目录
MODEL_CACHE_DIR="${HOME}/.openclaw/models"
MODEL_DOWNLOAD_DIR="${HOME}/.openclaw/downloads"

# ------------------------------------------------------------------------------
# 性能调优
# ------------------------------------------------------------------------------

# oMLX 性能配置
OMLX_THREADS=8
OMLX_BATCH_SIZE=1
OMLX_MAX_MEMORY=10737418240  # 10GB

# PyTorch MPS 配置
MPS_ENABLE_FALLBACK=true
MPS_MEMORY_FRACTION=0.8

# ------------------------------------------------------------------------------
# 下载配置
# ------------------------------------------------------------------------------

# 模型下载重试次数
MODEL_DOWNLOAD_RETRY=3

# 模型下载超时（秒）
MODEL_DOWNLOAD_TIMEOUT=3600

# 断点续传支持
MODEL_DOWNLOAD_RESUME=true
