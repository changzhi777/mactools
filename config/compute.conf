CHIP_M1_MAX_CORES=10
CHIP_M1_MAX_MEMORY_BANDWIDTH=400  # GB/s
CHIP_M1_MAX_NEURAL_ENGINE=16
CHIP_M1_MAX_RELEASE_YEAR=2021

# M2 芯片 (2022年)
CHIP_M2_NAME="Apple M2"
CHIP_M2_CORES=8
CHIP_M2_MEMORY_BANDWIDTH=100  # GB/s
CHIP_M2_NEURAL_ENGINE=16
