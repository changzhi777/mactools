# ==============================================================================
# MacClaw Install - 国内镜像源配置
# ==============================================================================
#
# 说明：此文件配置各种组件的国内镜像源
# 修改：如需更换镜像源，可以修改此文件
#
# ==============================================================================

# ------------------------------------------------------------------------------
# Homebrew 镜像源
# ------------------------------------------------------------------------------

# Homebrew 仓库镜像
HOMEBREW_BREW_GIT_REMOTE="https://mirrors.ustc.edu.cn/git/brew.git"
HOMEBREW_CORE_GIT_REMOTE="https://mirrors.ustc.edu.cn/git/homebrew-core.git"

# Homebrew Bottle 镜像（二进制包）
HOMEBREW_BOTTLE_DOMAIN="https://mirrors.ustc.edu.cn/homebrew-bottles"

# ------------------------------------------------------------------------------
# Node.js 镜像源
# ------------------------------------------------------------------------------

# nvm Node.js 镜像
NVM_NODEJS_ORG_MIRROR="https://npmmirror.com/mirrors/node"

# npm registry 镜像
NPM_REGISTRY="https://registry.npmmirror.com"

# ------------------------------------------------------------------------------
# Python pip 镜像源
# ------------------------------------------------------------------------------

# pip index 镜像
PIP_INDEX_URL="https://pypi.tuna.tsinghua.edu.cn/simple"
PIP_TRUSTED_HOST="pypi.tuna.tsinghua.edu.cn"

# ------------------------------------------------------------------------------
# OpenClaw 镜像源
# ------------------------------------------------------------------------------

# OpenClaw npm 包镜像
OPENCLAW_NPM_REGISTRY="https://registry.npmmirror.com"

# AI 模型镜像
MODEL_MIRROR="https://modelscope.cn"

# ------------------------------------------------------------------------------
# 备用镜像源
# ------------------------------------------------------------------------------

# 备用 Homebrew 镜像
HOMEBREW_BACKUP_MIRROR="https://mirrors.tuna.tsinghua.edu.cn"

# 备用 npm 镜像
NPM_BACKUP_REGISTRY="https://registry.npm.taobao.org"

# 备用 pip 镜像
PIP_BACKUP_INDEX_URL="https://mirrors.aliyun.com/pypi/simple/"
