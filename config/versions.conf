# ==============================================================================
# MacClaw Install - 组件版本配置
# ==============================================================================
#
# 说明：此文件配置各组件的版本要求
# 修改：如需更新版本，可以修改此文件
#
# ==============================================================================

# ------------------------------------------------------------------------------
# 系统要求
# ------------------------------------------------------------------------------

# 最低 macOS 版本
MACOS_MIN_VERSION="12.0"

# 推荐 macOS 版本
MACOS_RECOMMENDED_VERSION="13.0"

# 最低磁盘空间（字节）
DISK_MIN_SPACE=5368709120        # 5GB
DISK_RECOMMENDED_SPACE=21474836480  # 20GB

# 最低内存（字节）
MEMORY_MIN_SIZE=17179869184      # 16GB

# ------------------------------------------------------------------------------
# Homebrew 版本
# ------------------------------------------------------------------------------

# 最低 Homebrew 版本
HOMEBREW_MIN_VERSION="4.0.0"

# 推荐安装的 Homebrew 版本
HOMEBREW_RECOMMENDED_VERSION="4.3.0"

# ------------------------------------------------------------------------------
# Node.js 版本
# ------------------------------------------------------------------------------

# 最低 Node.js 版本
NODEJS_MIN_VERSION="18.0.0"

# 推荐 Node.js LTS 版本
NODEJS_RECOMMENDED_VERSION="20.11.0"

# nvm 版本
NVM_VERSION="0.39.7"

# ------------------------------------------------------------------------------
# Python 版本
# ------------------------------------------------------------------------------

# 最低 Python 版本
PYTHON_MIN_VERSION="3.8.0"

# 推荐安装的 Python 版本
PYTHON_RECOMMENDED_VERSION="3.11.0"

# ------------------------------------------------------------------------------
# OpenClaw 版本
# ------------------------------------------------------------------------------

# OpenClaw 最低版本
OPENCLAW_MIN_VERSION="1.0.0"

# 推荐安装的 OpenClaw 版本
OPENCLAW_RECOMMENDED_VERSION="latest"

# ------------------------------------------------------------------------------
# oMLX 版本
# ------------------------------------------------------------------------------

# oMLX 最低版本
OMLX_MIN_VERSION="0.5.0"

# 推荐安装的 oMLX 版本
OMLX_RECOMMENDED_VERSION="latest"

# ------------------------------------------------------------------------------
# AI 模型版本
# ------------------------------------------------------------------------------

# 推荐的 AI 模型
MODEL_RECOMMENDED="gemma-4-e4b-it-4bit"

# 模型大小（字节）
MODEL_SIZE=4294967296  # 约 4GB

# ------------------------------------------------------------------------------
# 插件版本
# ------------------------------------------------------------------------------

# 默认安装的插件
PLUGINS_DEFAULT=(
    "@iotchange/skill-developer"
    "@iotchange/skill-coder"
)

# ------------------------------------------------------------------------------
# 兼容性版本
# ------------------------------------------------------------------------------

# 兼容模式下的 Node.js 版本
NODEJS_COMPATIBLE_VERSION="16.20.0"

# 兼容模式下的最低要求
COMPATIBLE_DISK_MIN_SPACE=3221225472  # 3GB
