# MacClaw Installer - 版本配置
# 作者: 外星动物（常智）
# 版本: V1.0.1

# Node.js 版本
NODEJS_VERSION="lts/*"

# OpenClaw 版本
OPENCLAW_VERSION="latest"

# oMLX 版本
OMLX_VERSION="0.2.24"

# AI 模型
MODEL_NAME="mlx-community/gemma-4-e4b-it-4bit"
MODEL_SIZE="4GB"

# 最小系统要求
MIN_MACOS_VERSION="12.0"
MIN_MEMORY_GB="16"
MIN_DISK_GB="20"

# 端口配置
OPENCLAW_PORT="18789"
OMLX_PORT="8008"
